<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หิ้งของฉัน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#F3EDE0;
  --parchment-dark:#E7DCC2;
  --card:#FFFCF6;
  --ink:#232435;
  --ink-soft:#6b6a7c;
  --line:#D9CDAE;
  --stamp-red:#B4432F;
  --stamp-gold:#B98A2E;
  --stamp-green:#5C7A52;
  --stamp-grey:#8b8878;
  --shadow-col:rgba(35,36,53,.15);
}
body.dark{
  --parchment:#1C1B26;
  --parchment-dark:#272533;
  --card:#2C2A3A;
  --ink:#EEE9DD;
  --ink-soft:#a39ec4;
  --line:#423f56;
  --stamp-red:#E0725C;
  --stamp-gold:#D9AE55;
  --stamp-green:#8CB37E;
  --stamp-grey:#9b96b3;
  --shadow-col:rgba(0,0,0,.45);
}
body{ transition:background-color .25s ease, color .25s ease; }
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(1200px 800px at 10% -10%, color-mix(in srgb, var(--parchment) 85%, white) 0%, transparent 60%), var(--parchment);
  font-family:'IBM Plex Sans Thai', sans-serif;
  color:var(--ink);
  min-height:100vh;
}
.paper-texture{
  position:fixed; inset:0; pointer-events:none; opacity:.35; mix-blend-mode:multiply;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, transparent 1px, transparent 2px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0px, transparent 1px, transparent 2px);
}

header{
  padding:28px 32px 18px 32px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--ink);
  flex-wrap:wrap; gap:14px;
}
.brand{display:flex; align-items:center; gap:12px;}
.brand h1{ font-family:'Chonburi', cursive; font-size:34px; margin:0; letter-spacing:.5px; color:var(--ink); }
.brand span.sub{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); letter-spacing:1px; text-transform:uppercase; }
.btn{
  font-family:'IBM Plex Sans Thai', sans-serif; font-weight:600; font-size:14px;
  border:2px solid var(--ink); background:var(--card); color:var(--ink);
  padding:10px 16px; border-radius:3px; cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
  box-shadow:3px 3px 0 var(--ink);
}
.btn:hover{transform:translate(-2px,-2px); box-shadow:5px 5px 0 var(--ink);}
.btn:active{transform:translate(0,0); box-shadow:1px 1px 0 var(--ink);}
.btn.primary{background:var(--stamp-red); color:#fff; border-color:var(--stamp-red); box-shadow:3px 3px 0 #7d2c1e;}
.btn.primary:hover{box-shadow:5px 5px 0 #7d2c1e;}
.btn.small{padding:6px 10px; font-size:12px; box-shadow:2px 2px 0 var(--ink);}

.layout{ display:grid; grid-template-columns:220px 1fr; min-height:calc(100vh - 92px); }
@media (max-width:720px){
  .layout{grid-template-columns:1fr;}
  .rail{ display:flex; overflow-x:auto; flex-direction:row; padding:14px 12px; border-right:none; border-bottom:2px solid var(--ink); gap:8px; }
  .rail .tab{ margin:0 !important; border-radius:4px 4px 0 0; }
}

.rail{ background:var(--parchment-dark); border-right:2px solid var(--ink); padding:24px 0; display:flex; flex-direction:column; gap:4px; }
.tab{
  position:relative; padding:12px 14px 12px 18px; margin-right:14px;
  background:var(--card); border:2px solid var(--ink); border-left:none;
  border-radius:0 8px 8px 0; cursor:pointer; font-weight:600; font-size:14px;
  display:flex; align-items:center; gap:8px; color:var(--ink-soft);
  transition:margin .12s ease, color .12s ease;
}
.tab .icon{font-size:17px;}
.tab:hover{margin-right:8px; color:var(--ink);}
.tab.active{ margin-right:0; background:var(--parchment); color:var(--ink); box-shadow: inset 4px 0 0 var(--stamp-red); }
.tab .count{ margin-left:auto; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-soft); background:var(--parchment-dark); border-radius:10px; padding:1px 7px; }
.tab.active .count{background:var(--card);}
.add-cat{
  margin:14px 14px 0 18px; padding:10px 12px; border:2px dashed var(--line); border-radius:6px;
  background:transparent; color:var(--ink-soft); font-size:13px; cursor:pointer; text-align:center;
  font-family:'IBM Plex Sans Thai', sans-serif; font-weight:600;
}
.add-cat:hover{border-color:var(--ink); color:var(--ink);}

main{padding:28px 32px 60px 32px;}
.main-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px; }
.main-head h2{ font-family:'Chonburi', cursive; font-size:24px; margin:0; display:flex; align-items:center; gap:10px; }
.main-head .meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); }
.cat-actions{display:flex; gap:8px; flex-wrap:wrap;}

.empty-state{ border:2px dashed var(--line); border-radius:10px; padding:60px 20px; text-align:center; color:var(--ink-soft); }
.empty-state .big{font-size:38px; margin-bottom:10px; display:block;}

.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:18px; }
.card{
  background:var(--card); border:2px solid var(--ink); border-radius:8px; padding:0 0 14px 0;
  position:relative; box-shadow:4px 4px 0 var(--shadow-col);
  display:flex; flex-direction:column; gap:8px; cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
}
.card:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--shadow-col);}
.card .thumb{
  width:100%; height:150px; border-bottom:2px solid var(--ink); border-radius:6px 6px 0 0;
  overflow:hidden; background:var(--parchment-dark); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.card .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.card .thumb .placeholder{font-size:34px; opacity:.4;}
.card .body{padding:14px 16px 0 16px; display:flex; flex-direction:column; gap:8px; flex-grow:1;}
.card .top-row{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.card h3{ font-family:'IBM Plex Sans Thai', sans-serif; font-weight:700; font-size:16px; margin:0; line-height:1.35; }
.card .date{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--ink-soft); }
.card .note{ font-size:13px; color:var(--ink-soft); line-height:1.5; flex-grow:1; white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card .note-hint{ font-size:11px; color:var(--stamp-red); font-weight:600; margin-top:-4px; }
.card .bottom-row{ display:flex; align-items:center; justify-content:space-between; margin-top:4px; }
.card .row-actions{display:flex; gap:6px;}
.icon-btn{ background:none; border:none; cursor:pointer; font-size:14px; color:var(--ink-soft); padding:2px 4px; }
.icon-btn:hover{color:var(--stamp-red);}

.stamp{
  flex-shrink:0; width:56px; height:56px; border-radius:50%; border:2.5px solid currentColor;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:rotate(-8deg); font-family:'IBM Plex Mono', monospace; line-height:1;
}
.stamp .num{font-size:19px; font-weight:600;}
.stamp .of10{font-size:8px; opacity:.75; margin-top:1px;}
.tier-legend{ display:flex; gap:8px; font-family:'IBM Plex Mono', monospace; font-size:14px; margin-top:-12px; margin-bottom:22px; color:var(--ink-soft); flex-wrap:wrap; }
.tier-legend .pill{ display:flex; align-items:center; gap:5px; border:1px solid var(--line); border-radius:20px; padding:3px 10px 3px 6px; }
.tier-legend .dot{width:9px; height:9px; border-radius:50%;}

.ribbon{
  position:absolute; top:-1px; right:14px; background:var(--stamp-red); color:#fff;
  font-family:'IBM Plex Mono', monospace; font-size:10px; font-weight:600;
  padding:3px 8px 5px 8px; border-radius:0 0 5px 5px; letter-spacing:.5px;
  box-shadow:0 2px 4px rgba(0,0,0,.2);
}

/* modal */
.overlay{ position:fixed; inset:0; background:rgba(35,36,53,.45); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
.overlay.show{display:flex;}
.modal{
  background:var(--parchment); border:2px solid var(--ink); border-radius:10px; width:100%; max-width:420px;
  padding:24px; box-shadow:6px 6px 0 var(--shadow-col); max-height:90vh; overflow-y:auto;
}
.modal h3{ font-family:'Chonburi', cursive; font-size:20px; margin:0 0 16px 0; }
.field{margin-bottom:16px;}
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:.5px; }
.field input[type=text], .field textarea{
  width:100%; border:2px solid var(--ink); border-radius:5px; padding:9px 10px;
  font-family:'IBM Plex Sans Thai', sans-serif; font-size:14px; background:var(--card); color:var(--ink); resize:vertical;
}
.field textarea{min-height:70px;}
.field input:focus-visible, .field textarea:focus-visible, .icon-choices button:focus-visible, .btn:focus-visible, .tab:focus-visible{
  outline:2px solid var(--stamp-gold); outline-offset:2px;
}
.icon-choices{display:flex; flex-wrap:wrap; gap:8px;}
.icon-choices button{ width:38px; height:38px; font-size:18px; border:2px solid var(--line); background:var(--card); border-radius:6px; cursor:pointer; }
.icon-choices button.sel{border-color:var(--ink); background:var(--parchment-dark);}
.score-wrap{display:flex; align-items:center; gap:14px;}
.score-wrap input[type=range]{flex-grow:1; accent-color:var(--stamp-red);}
.score-readout{ font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:15px; min-width:70px; text-align:right; }
.score-tier-label{font-size:12px; color:var(--ink-soft); margin-top:4px;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}
.modal-actions .btn.ghost{background:transparent; box-shadow:none; border-color:var(--line); color:var(--ink-soft);}

.screen{min-height:100vh;}

/* ---- image manager (inside add/edit item modal) ---- */
.image-manager{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.img-manager-empty{ width:100%; padding:16px; text-align:center; font-size:12px; color:var(--ink-soft); border:2px dashed var(--line); border-radius:6px; }
.img-manager-thumb{ position:relative; width:64px; height:64px; border-radius:6px; overflow:hidden; border:2px solid var(--ink); flex-shrink:0; }
.img-manager-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.img-manager-remove{
  position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%;
  background:rgba(35,36,53,.8); color:#fff; border:none; cursor:pointer;
  font-size:10px; line-height:1; display:flex; align-items:center; justify-content:center;
}
.image-add-controls{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.image-add-controls input[type=text]{flex-grow:1; min-width:140px;}

/* ---- full detail page ---- */
.detail-topbar{
  display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:2px solid var(--ink);
  flex-wrap:wrap; gap:10px; background:var(--parchment); position:sticky; top:0; z-index:10;
}
.detail-topbar-actions{display:flex; gap:8px;}
.detail-page{ max-width:920px; margin:0 auto; padding:32px 32px 70px 32px; display:grid; grid-template-columns:1fr; gap:28px; }
@media (min-width:820px){ .detail-page{grid-template-columns:1.1fr 1fr; align-items:start;} }
.gallery-main{
  width:100%; min-height:280px; max-height:560px; border:2px solid var(--ink); border-radius:10px;
  background:var(--parchment-dark); display:flex; align-items:center; justify-content:center; overflow:hidden;
  box-shadow:4px 4px 0 var(--shadow-col);
}
.gallery-main img{width:100%; height:100%; max-height:560px; object-fit:cover; display:block;}
.gallery-main .placeholder{font-size:80px; opacity:.35;}
.gallery-thumbs{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.gallery-thumbs .g-thumb{ width:56px; height:56px; border-radius:6px; overflow:hidden; cursor:pointer; border:2px solid var(--line); }
.gallery-thumbs .g-thumb.active{border-color:var(--stamp-red);}
.gallery-thumbs .g-thumb img{width:100%; height:100%; object-fit:cover; display:block;}

.detail-info .detail-cat-tag{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
.detail-info h1{ font-family:'Chonburi', cursive; font-size:30px; margin:0 0 14px 0; line-height:1.25; }
.detail-meta-row{display:flex; align-items:center; gap:14px; margin-bottom:18px;}
.tier-badge{ font-family:'IBM Plex Mono', monospace; font-size:13px; font-weight:600; padding:6px 14px; border-radius:20px; border:2px solid currentColor; }
.detail-meta-list{
  display:flex; flex-direction:column; gap:6px; font-size:13px; color:var(--ink-soft); margin-bottom:20px;
  border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:12px 0;
}
.detail-meta-list .meta-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); margin-right:8px; display:inline-block; min-width:100px; }
.detail-note-block .meta-label{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); margin-bottom:8px; display:block; }
.detail-note{font-size:15px; line-height:1.8; white-space:pre-wrap; color:var(--ink);}
.detail-note.empty{color:var(--ink-soft); font-style:italic;}
.detail-ribbon{
  display:inline-block; background:var(--stamp-red); color:#fff; font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600;
  padding:4px 10px; border-radius:4px; margin-bottom:10px; letter-spacing:.5px;
}

/* ---- floating settings button ---- */
.fab-settings{
  position:fixed; right:22px; bottom:22px; z-index:40; width:52px; height:52px; border-radius:50%;
  background:var(--card); border:2px solid var(--ink); color:var(--ink); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; box-shadow:3px 3px 0 var(--shadow-col);
  transition:transform .15s ease;
}
.fab-settings:hover{transform:rotate(25deg) scale(1.05);}

/* ---- settings modal ---- */
.settings-section{margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--line);}
.settings-section:last-of-type{border-bottom:none; margin-bottom:0; padding-bottom:0;}
.settings-section h4{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft); margin:0 0 12px 0; }
.persona-row{display:flex; align-items:center; gap:14px;}
.avatar-upload{
  position:relative; width:64px; height:64px; border-radius:50%; flex-shrink:0;
  border:2px solid var(--ink); background:var(--parchment-dark);
  display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer; font-size:24px;
}
.avatar-upload img{width:100%; height:100%; object-fit:cover;}
.avatar-upload .edit-badge{
  position:absolute; bottom:0; right:0; width:20px; height:20px; border-radius:50%;
  background:var(--stamp-red); color:#fff; font-size:10px;
  display:flex; align-items:center; justify-content:center; border:2px solid var(--card);
}
.persona-row .field{flex-grow:1; margin-bottom:0;}
.theme-swatches{display:flex; gap:10px;}
.theme-swatch{
  flex:1; border:2px solid var(--line); border-radius:8px; padding:12px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:8px; font-size:12px; font-weight:600;
  color:var(--ink-soft); background:var(--card);
}
.theme-swatch.active{border-color:var(--stamp-red); color:var(--ink);}
.theme-swatch .swatch-preview{width:100%; height:34px; border-radius:5px; border:1px solid var(--line);}
.theme-swatch.light .swatch-preview{background:linear-gradient(135deg,#F3EDE0,#FFFCF6);}
.theme-swatch.dark .swatch-preview{background:linear-gradient(135deg,#1C1B26,#2C2A3A);}

/* ---- comments section (on detail page) ---- */
.comments-section{margin-top:26px; padding-top:20px; border-top:1px solid var(--line);}
.comments-list{display:flex; flex-direction:column; gap:14px; margin-bottom:18px;}
.comment-item{display:flex; gap:10px;}
.comment-avatar{
  width:36px; height:36px; border-radius:50%; flex-shrink:0; overflow:hidden;
  border:2px solid var(--ink); background:var(--parchment-dark);
  display:flex; align-items:center; justify-content:center; font-size:14px;
}
.comment-avatar img{width:100%; height:100%; object-fit:cover;}
.comment-body{flex-grow:1; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px;}
.comment-head{display:flex; align-items:center; gap:8px; margin-bottom:3px;}
.comment-author{font-weight:700; font-size:13px;}
.comment-date{font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--ink-soft);}
.comment-text{font-size:13.5px; line-height:1.6; white-space:pre-wrap;}
.comments-empty{font-size:13px; color:var(--ink-soft); font-style:italic; margin-bottom:16px;}

.comment-form{display:flex; gap:10px; align-items:flex-end;}
.comment-form textarea{
  flex-grow:1; min-height:48px; border:2px solid var(--ink); border-radius:8px; padding:8px 10px;
  font-family:'IBM Plex Sans Thai',sans-serif; font-size:13.5px; background:var(--card); color:var(--ink); resize:vertical;
}
.comment-form .send-btn{align-self:flex-end;}
.reply-toggle-btn{
  background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:11.5px; font-weight:700;
  padding:2px 0; margin-top:6px; text-align:left; font-family:'IBM Plex Sans Thai',sans-serif;
}
.reply-toggle-btn:hover{color:var(--stamp-red);}
.comment-replies{
  margin-top:10px; padding-left:16px; border-left:2px solid var(--line);
  display:flex; flex-direction:column; gap:10px;
}
.reply-item{display:flex; gap:8px;}
.reply-avatar{width:28px; height:28px; font-size:12px;}
.reply-form{margin-top:2px;}
.persona-setup{ border:2px dashed var(--line); border-radius:10px; padding:16px; text-align:center; }
.persona-setup p{font-size:13px; color:var(--ink-soft); margin:0 0 12px 0;}
.persona-setup-row{display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap;}
.persona-setup-row input[type=text]{
  border:2px solid var(--ink); border-radius:6px; padding:8px 10px; font-size:13px;
  font-family:'IBM Plex Sans Thai',sans-serif; background:var(--card); color:var(--ink); min-width:160px;
}
.change-persona-link{font-size:11px; text-decoration:underline; color:var(--ink-soft); background:none; border:none; cursor:pointer; padding:0;}
.change-persona-link:hover{color:var(--ink);}

::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px;}

@media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="paper-texture"></div>
<button class="fab-settings" id="openSettingsBtn" title="ตั้งค่า">⚙️</button>

<div id="screenList" class="screen">
  <header>
    <div class="brand">
      <h1>RATE EVERYTHING YOU WANTS</h1>
      <span class="sub">Personal Rating Shelf</span>
    </div>
    <button class="btn primary" id="openAddItemBtn">+ เพิ่มรายการ</button>
  </header>

  <div class="layout">
    <nav class="rail" id="rail"></nav>

    <main>
      <div class="main-head">
        <h2 id="catTitle"><span id="catIcon">📺</span><span id="catName">อนิเมะ</span></h2>
        <div class="cat-actions">
          <span class="meta" id="catMeta"></span>
          <button class="btn small" id="renameCatBtn">แก้ไขหมวด</button>
          <button class="btn small" id="deleteCatBtn">ลบหมวด</button>
        </div>
      </div>

      <div class="tier-legend">
        <span class="pill"><span class="dot" style="background:var(--stamp-red)"></span>9–10 ขึ้นหิ้ง</span>
        <span class="pill"><span class="dot" style="background:var(--stamp-gold)"></span>7–8.9 ดีมาก</span>
        <span class="pill"><span class="dot" style="background:var(--stamp-green)"></span>5–6.9 พอดู</span>
        <span class="pill"><span class="dot" style="background:var(--stamp-grey)"></span>0–4.9 ธรรมดา</span>
      </div>

      <div id="gridArea"></div>
    </main>
  </div>
</div>

<div id="screenDetail" class="screen" style="display:none;">
  <div class="detail-topbar">
    <button class="btn small" id="backBtn">← กลับไปหิ้ง</button>
    <div class="detail-topbar-actions">
      <button class="btn small" id="pageEditBtn">✏️ แก้ไข</button>
      <button class="btn small" id="pageDeleteBtn">🗑️ ลบ</button>
    </div>
  </div>
  <div class="detail-page">
    <div class="gallery">
      <div class="gallery-main" id="galleryMain"></div>
      <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>
    <div class="detail-info">
      <div id="pageRibbon" class="detail-ribbon" style="display:none;">ขึ้นหิ้ง</div>
      <div class="detail-cat-tag" id="pageCatTag"></div>

<script>
const ICONS = ['📺','📚','🎬','🎮','🎵','🎨','🍜','⚽','🧩','🃏','🧸','🖥️','✈️','☕','🏠','⭐'];
const STORAGE_KEY = 'shelf-data';
let state = null;
let activeCatId = null;
let editingCatId = null;
let editingItemId = null;
let editingFromDetail = false;

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

function defaultState(){
  const animeId = uid(), bookId = uid(), movieId = uid(), gameId = uid();
  return {
    categories: [
      {id:animeId, name:'อนิเมะ', icon:'📺'},
      {id:bookId, name:'หนังสือ', icon:'📚'},
      {id:movieId, name:'หนัง', icon:'🎬'},
      {id:gameId, name:'เกม', icon:'🎮'},
    ],
    items: [
      {id:uid(), categoryId:animeId, title:"Frieren: Beyond Journey's End", score:9.5,
       note:'เรื่องราวช้าๆ อบอุ่นแต่แฝงความเศร้า งานภาพและเพลงประกอบยอดเยี่ยม ดูจบแล้วคิดถึงเวลาที่ผ่านไปกับคนรอบตัว',
       date:new Date().toISOString().slice(0,10), images:[], comments:[]}
    ],
    settings: { personaName:'', personaAvatar:null, theme:'light' }
  };
}

function hasWidgetStorage(){
  return typeof window !== 'undefined' && window.storage
    && typeof window.storage.get === 'function' && typeof window.storage.set === 'function';
}
async function storageGet(key){
  if(hasWidgetStorage()){
    try{ return await window.storage.get(key, false); }
    catch(e){ return null; }
  }
  try{
    const raw = window.localStorage.getItem(key);
    return raw ? {key, value: raw} : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(hasWidgetStorage()){
    try{ return await window.storage.set(key, value, false); }
    catch(e){ console.error('บันทึกผ่าน window.storage ไม่สำเร็จ', e); return null; }
  }
  try{ window.localStorage.setItem(key, value); return {key, value}; }
  catch(e){ console.error('บันทึกผ่าน localStorage ไม่สำเร็จ', e); return null; }
}

async function loadState(){
  try{
    const res = await storageGet(STORAGE_KEY);
    if(res && res.value){
      state = JSON.parse(res.value);
      if(!state.categories) state.categories = [];
      if(!state.items) state.items = [];
      if(!state.settings) state.settings = { personaName:'', personaAvatar:null, theme:'light' };
      if(typeof state.settings.personaName !== 'string') state.settings.personaName = '';
      if(!('personaAvatar' in state.settings)) state.settings.personaAvatar = null;
      if(!state.settings.theme) state.settings.theme = 'light';
      state.items.forEach(it=>{
        if(!Array.isArray(it.images)){ it.images = it.imageUrl ? [it.imageUrl] : []; }
        if(!Array.isArray(it.comments)) it.comments = [];
        it.comments.forEach(c=>{ if(!Array.isArray(c.replies)) c.replies = []; });
      });
      return;
    }
  }catch(e){ /* not found yet */ }
  state = defaultState();
  await saveState();
}

async function saveState(){
  await storageSet(STORAGE_KEY, JSON.stringify(state));
}

function tierOf(score){
  if(score >= 9) return {label:'ขึ้นหิ้ง', color:'var(--stamp-red)'};
  if(score >= 7) return {label:'ดีมาก', color:'var(--stamp-gold)'};
  if(score >= 5) return {label:'พอดู', color:'var(--stamp-green)'};
  return {label:'ธรรมดา', color:'var(--stamp-grey)'};
}

function applyTheme(theme){
  document.body.classList.toggle('dark', theme === 'dark');
}

function escapeAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;'); }
function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str == null ? '' : str; return d.innerHTML; }

/* ---------- Rail / grid ---------- */
function renderRail(){
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  state.categories.forEach(cat=>{
    const count = state.items.filter(i=>i.categoryId===cat.id).length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (cat.id===activeCatId ? ' active' : '');
    tab.tabIndex = 0;
    tab.innerHTML = `<span class="icon">${cat.icon}</span><span>${escapeHtml(cat.name)}</span><span class="count">${count}</span>`;
    tab.addEventListener('click', ()=>{ activeCatId = cat.id; renderAll(); });
    tab.addEventListener('keydown', e=>{ if(e.key==='Enter' || e.key===' '){ activeCatId = cat.id; renderAll(); }});
    rail.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-cat';
  addBtn.textContent = '+ เพิ่มหมวดหมู่';
  addBtn.addEventListener('click', openAddCategory);
  rail.appendChild(addBtn);
}

function renderMainHead(){
  const cat = state.categories.find(c=>c.id===activeCatId);
  if(!cat) return;
  document.getElementById('catIcon').textContent = cat.icon;
  document.getElementById('catName').textContent = cat.name;
  const items = state.items.filter(i=>i.categoryId===activeCatId);
  document.getElementById('catMeta').textContent = items.length ? `${items.length} รายการ` : '';
}

function renderGrid(){
  const gridArea = document.getElementById('gridArea');
  const cat = state.categories.find(c=>c.id===activeCatId);
  const items = state.items.filter(i=>i.categoryId===activeCatId).sort((a,b)=> b.score - a.score);
  if(items.length===0){
    gridArea.innerHTML = `<div class="empty-state">
      <div class="big">📭</div>
      <div>ยังไม่มีรายการในหมวดนี้ — กดปุ่ม "+ เพิ่มรายการ" มุมขวาบนเพื่อเริ่มให้คะแนนได้เลย</div>
    </div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'grid';
  items.forEach(item=>{
    const tier = tierOf(item.score);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.open = item.id;
    const thumbSrc = (item.images && item.images.length) ? item.images[0] : null;
    const commentCount = (item.comments || []).length;
    card.innerHTML = `
      ${item.score>=9 ? '<div class="ribbon">ขึ้นหิ้ง</div>' : ''}
      <div class="thumb">
        ${thumbSrc ? `<img src="${escapeAttr(thumbSrc)}" alt="${escapeAttr(item.title)}" onerror="this.parentElement.innerHTML='<span class=&quot;placeholder&quot;>🖼️</span>'">` : `<span class="placeholder">${cat ? cat.icon : '🖼️'}</span>`}
      </div>
      <div class="body">
        <div class="top-row">
          <div>
            <h3>${escapeHtml(item.title)}</h3>
            <div class="date">${item.date || ''}${commentCount ? ' · 💬 ' + commentCount : ''}</div>
          </div>
          <div class="stamp" style="color:${tier.color}">
            <div class="num">${item.score.toFixed(1)}</div>
            <div class="of10">/10</div>
          </div>
        </div>
        ${item.note ? `<div class="note">${escapeHtml(item.note)}</div>` : '<div class="note" style="opacity:.5">ไม่มีบันทึกรีวิว</div>'}
        ${item.note && item.note.length > 60 ? '<div class="note-hint">อ่านต่อ →</div>' : ''}
        <div class="bottom-row">
          <span style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:${tier.color}; font-weight:600;">${tier.label}</span>
          <div class="row-actions">
            <button class="icon-btn" title="แก้ไข" data-edit="${item.id}">✏️</button>
            <button class="icon-btn" title="ลบ" data-del="${item.id}">🗑️</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  gridArea.innerHTML = '';
  gridArea.appendChild(grid);
  gridArea.querySelectorAll('[data-edit]').forEach(btn=>{ btn.addEventListener('click', (e)=>{ e.stopPropagation(); openEditItem(btn.dataset.edit); }); });
  gridArea.querySelectorAll('[data-del]').forEach(btn=>{ btn.addEventListener('click', (e)=>{ e.stopPropagation(); deleteItem(btn.dataset.del); }); });
  gridArea.querySelectorAll('[data-open]').forEach(card=>{ card.addEventListener('click', ()=> openDetail(card.dataset.open)); });
}

function renderAll(){
  if(!state.categories.find(c=>c.id===activeCatId)){
    activeCatId = state.categories[0] ? state.categories[0].id : null;
  }
  renderRail();
  if(activeCatId){
    document.getElementById('catTitle').style.display = '';
    renderMainHead();
    renderGrid();
  } else {
    document.getElementById('gridArea').innerHTML = `<div class="empty-state"><div class="big">🗂️</div><div>ยังไม่มีหมวดหมู่ — เริ่มจากกดปุ่ม "+ เพิ่มหมวดหมู่" ทางซ้ายมือ</div></div>`;
  }
}

/* ---------- Category modal ---------- */
const catOverlay = document.getElementById('catOverlay');
let selectedIcon = ICONS[0];
function buildIconChoices(){
  const wrap = document.getElementById('iconChoices');
  wrap.innerHTML = '';
  ICONS.forEach(ic=>{
    const b = document.createElement('button');
    b.type='button';
    b.textContent = ic;
    if(ic===selectedIcon) b.classList.add('sel');
    b.addEventListener('click', ()=>{
      selectedIcon = ic;
      wrap.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
    });
    wrap.appendChild(b);
  });
}
function openAddCategory(){
  editingCatId = null;
  document.getElementById('catModalTitle').textContent = 'เพิ่มหมวดหมู่ใหม่';
  document.getElementById('catNameInput').value = '';
  selectedIcon = ICONS[Math.floor(Math.random()*ICONS.length)];
  buildIconChoices();
  catOverlay.classList.add('show');
  document.getElementById('catNameInput').focus();
}
function openEditCategory(){
  const cat = state.categories.find(c=>c.id===activeCatId);
  if(!cat) return;
  editingCatId = cat.id;
  document.getElementById('catModalTitle').textContent = 'แก้ไขหมวดหมู่';
  document.getElementById('catNameInput').value = cat.name;
  selectedIcon = cat.icon;
  buildIconChoices();
  catOverlay.classList.add('show');
}
document.getElementById('renameCatBtn').addEventListener('click', openEditCategory);
document.getElementById('catCancelBtn').addEventListener('click', ()=> catOverlay.classList.remove('show'));
catOverlay.addEventListener('click', e=>{ if(e.target===catOverlay) catOverlay.classList.remove('show'); });
document.getElementById('catSaveBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('catNameInput').value.trim();
  if(!name){ document.getElementById('catNameInput').focus(); return; }
  if(editingCatId){
    const cat = state.categories.find(c=>c.id===editingCatId);
    cat.name = name; cat.icon = selectedIcon;
  } else {
    const id = uid();
    state.categories.push({id, name, icon:selectedIcon});
    activeCatId = id;
  }
  await saveState();
  catOverlay.classList.remove('show');
  renderAll();
});
document.getElementById('deleteCatBtn').addEventListener('click', async ()=>{
  const cat = state.categories.find(c=>c.id===activeCatId);
  if(!cat) return;
  const itemCount = state.items.filter(i=>i.categoryId===cat.id).length;
  const msg = itemCount>0 ? `ลบหมวด "${cat.name}" และรายการทั้งหมด ${itemCount} รายการในหมวดนี้?` : `ลบหมวด "${cat.name}"?`;
  if(!confirm(msg)) return;
  state.items = state.items.filter(i=>i.categoryId!==cat.id);
  state.categories = state.categories.filter(c=>c.id!==cat.id);
  activeCatId = state.categories[0] ? state.categories[0].id : null;
  await saveState();
  renderAll();
});

/* ---------- Item modal ---------- */
const itemOverlay = document.getElementById('itemOverlay');
const scoreInput = document.getElementById('itemScoreInput');
const scoreReadout = document.getElementById('itemScoreReadout');
const scoreTierLabel = document.getElementById('itemScoreTier');
function updateScoreReadout(){
  const v = parseFloat(scoreInput.value);
  scoreReadout.textContent = v.toFixed(1) + ' / 10';
  const tier = tierOf(v);
  scoreTierLabel.textContent = 'ระดับ: ' + tier.label;
  scoreTierLabel.style.color = tier.color;
}
scoreInput.addEventListener('input', updateScoreReadout);

let currentImages = [];
function renderImageManager(){
  const wrap = document.getElementById('imageManager');
  if(currentImages.length===0){
    wrap.innerHTML = '<div class="img-manager-empty">ยังไม่มีรูป — อัปโหลดหรือวางลิงก์ด้านล่าง</div>';
    return;
  }
  wrap.innerHTML = '';
  currentImages.forEach((src, idx)=>{
    const thumb = document.createElement('div');
    thumb.className = 'img-manager-thumb';
    thumb.innerHTML = `<img src="${escapeAttr(src)}" alt="รูปที่ ${idx+1}"><button type="button" class="img-manager-remove" data-idx="${idx}">✕</button>`;
    wrap.appendChild(thumb);
  });
  wrap.querySelectorAll('.img-manager-remove').forEach(btn=>{
    btn.addEventListener('click', ()=>{ currentImages.splice(parseInt(btn.dataset.idx,10),1); renderImageManager(); });
  });
}
function resizeImageFile(file, maxDim){
  maxDim = maxDim || 1600;
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width > maxDim || height > maxDim){
          if(width >= height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = ()=> reject(new Error('โหลดรูปไม่สำเร็จ'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('อ่านไฟล์ไม่สำเร็จ'));
    reader.readAsDataURL(file);
  });
}
const fileImgInput = document.getElementById('fileImgInput');
document.getElementById('uploadImgBtn').addEventListener('click', ()=> fileImgInput.click());
fileImgInput.addEventListener('change', async (e)=>{
  const files = Array.from(e.target.files || []);
  for(const file of files){
    try{ const dataUrl = await resizeImageFile(file); currentImages.push(dataUrl); }
    catch(err){ console.error(err); }
  }
  renderImageManager();
  e.target.value = '';
});
const urlImgInput = document.getElementById('urlImgInput');
urlImgInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const val = urlImgInput.value.trim();
    if(val){ currentImages.push(val); urlImgInput.value=''; renderImageManager(); }
  }
});
function fillCatSelect(selectedId){
  const sel = document.getElementById('itemCatSelect');
  sel.innerHTML = '';
  state.categories.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.icon} ${c.name}`;
    if(c.id===selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}
function openAddItem(){
  if(state.categories.length===0){ alert('กรุณาเพิ่มหมวดหมู่ก่อนเพิ่มรายการ'); openAddCategory(); return; }
  editingItemId = null; editingFromDetail = false;
  document.getElementById('itemModalTitle').textContent = 'เพิ่มรายการใหม่';
  fillCatSelect(activeCatId || state.categories[0].id);
  document.getElementById('itemTitleInput').value = '';
  document.getElementById('itemNoteInput').value = '';
  currentImages = [];
  renderImageManager();
  scoreInput.value = 8;
  updateScoreReadout();
  itemOverlay.classList.add('show');
  document.getElementById('itemTitleInput').focus();
}
function openEditItem(id, fromDetail){
  const item = state.items.find(i=>i.id===id);
  if(!item) return;
  editingItemId = id; editingFromDetail = !!fromDetail;
  document.getElementById('itemModalTitle').textContent = 'แก้ไขรายการ';
  fillCatSelect(item.categoryId);
  document.getElementById('itemTitleInput').value = item.title;
  document.getElementById('itemNoteInput').value = item.note || '';
  currentImages = item.images ? [...item.images] : [];
  renderImageManager();
  scoreInput.value = item.score;
  updateScoreReadout();
  itemOverlay.classList.add('show');
}
async function deleteItem(id){
  const item = state.items.find(i=>i.id===id);
  if(!item) return;
  if(!confirm(`ลบ "${item.title}" ออกจากหิ้ง?`)) return;
  state.items = state.items.filter(i=>i.id!==id);
  await saveState();
  renderAll();
}
document.getElementById('openAddItemBtn').addEventListener('click', openAddItem);
document.getElementById('itemCancelBtn').addEventListener('click', ()=> itemOverlay.classList.remove('show'));
itemOverlay.addEventListener('click', e=>{ if(e.target===itemOverlay) itemOverlay.classList.remove('show'); });
document.getElementById('itemSaveBtn').addEventListener('click', async ()=>{
  const title = document.getElementById('itemTitleInput').value.trim();
  if(!title){ document.getElementById('itemTitleInput').focus(); return; }
  const categoryId = document.getElementById('itemCatSelect').value;
  const score = parseFloat(scoreInput.value);
  const note = document.getElementById('itemNoteInput').value.trim();
  const images = currentImages.slice();
  let savedId = editingItemId;
  if(editingItemId){
    const item = state.items.find(i=>i.id===editingItemId);
    item.title = title; item.categoryId = categoryId; item.score = score; item.note = note; item.images = images;
  } else {
    savedId = uid();
    state.items.push({id:savedId, categoryId, title, score, note, images, date:new Date().toISOString().slice(0,10), comments:[]});
  }
  activeCatId = categoryId;
  await saveState();
  itemOverlay.classList.remove('show');
  renderAll();
  if(editingFromDetail){ renderDetailPage(state.items.find(i=>i.id===savedId)); }
});

/* ---------- Detail page (full page, hash-routed) ---------- */
let currentDetailId = null;
let currentGalleryIdx = 0;
function openDetail(id){ location.hash = '#/item/' + id; }
function handleRoute(){
  const m = location.hash.match(/^#\/item\/(.+)$/);
  if(m){
    const item = state.items.find(i=>i.id===m[1]);
    if(item){ showDetailScreen(item); return; }
  }
  showListScreen();
}
function showListScreen(){
  document.getElementById('screenList').style.display = '';
  document.getElementById('screenDetail').style.display = 'none';
  window.scrollTo(0,0);
}
function showDetailScreen(item){
  currentDetailId = item.id;
  currentGalleryIdx = 0;
  openReplyFor = null;
  renderDetailPage(item);
  document.getElementById('screenList').style.display = 'none';
  document.getElementById('screenDetail').style.display = '';
  window.scrollTo(0,0);
}
function renderGalleryMain(images){
  const main = document.getElementById('galleryMain');
  if(!images.length){
    const cat = state.categories.find(c=>c.id === (state.items.find(i=>i.id===currentDetailId)||{}).categoryId);
    main.innerHTML = `<span class="placeholder">${cat ? cat.icon : '🖼️'}</span>`;
    return;
  }
  const src = images[currentGalleryIdx] || images[0];
  main.innerHTML = `<img src="${escapeAttr(src)}" alt="รูปภาพ" onerror="this.parentElement.innerHTML='<span class=&quot;placeholder&quot;>🖼️</span>'">`;
}

/* ---- comments rendering ---- */
function avatarHtml(avatarSrc, placeholderEmoji){
  if(avatarSrc){ return `<img src="${escapeAttr(avatarSrc)}" alt="avatar">`; }
  return `<span>${placeholderEmoji || '🙂'}</span>`;
}
function formatCommentDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString('th-TH', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
  }catch(e){ return iso; }
}
let openReplyFor = null;
function renderComments(item){
  const list = document.getElementById('commentsList');
  const countEl = document.getElementById('commentCount');
  const comments = item.comments || [];
  const totalCount = comments.reduce((sum,c)=> sum + 1 + ((c.replies||[]).length), 0);
  countEl.textContent = totalCount ? `(${totalCount})` : '';
  if(comments.length === 0){
    list.innerHTML = '<div class="comments-empty">ยังไม่มีใครคอมเมนต์ — เป็นคนแรกเลย!</div>';
  } else {
    list.innerHTML = '';
    comments.slice().reverse().forEach(c=>{
      if(!Array.isArray(c.replies)) c.replies = [];
      const row = document.createElement('div');
      row.className = 'comment-item';
      const repliesHtml = c.replies.map(r => `
        <div class="reply-item">
          <div class="comment-avatar reply-avatar">${avatarHtml(r.avatar)}</div>
          <div class="comment-body">
            <div class="comment-head">
              <span class="comment-author">${escapeHtml(r.author)}</span>
              <span class="comment-date">${formatCommentDate(r.date)}</span>
              <button class="icon-btn" data-delr="${c.id}::${r.id}" title="ลบการตอบกลับ" style="margin-left:auto;">🗑️</button>
            </div>
            <div class="comment-text">${escapeHtml(r.text)}</div>
          </div>
        </div>
      `).join('');
      row.innerHTML = `
        <div class="comment-avatar">${avatarHtml(c.avatar)}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="comment-author">${escapeHtml(c.author)}</span>
            <span class="comment-date">${formatCommentDate(c.date)}</span>
            <button class="icon-btn" data-delc="${c.id}" title="ลบคอมเมนต์" style="margin-left:auto;">🗑️</button>
          </div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
          <button class="reply-toggle-btn" data-replytoggle="${c.id}">↩ ตอบกลับ${c.replies.length ? ` (${c.replies.length})` : ''}</button>
          <div class="comment-replies" id="replies-${c.id}" style="${(c.replies.length===0 && openReplyFor!==c.id) ? 'display:none;' : ''}">
            ${repliesHtml}
            <div id="replyFormArea-${c.id}"></div>
          </div>
        </div>
      `;
      list.appendChild(row);
    });
    list.querySelectorAll('[data-delc]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('ลบคอมเมนต์นี้ (รวมการตอบกลับทั้งหมด)?')) return;
        item.comments = item.comments.filter(c=>c.id !== btn.dataset.delc);
        await saveState();
        renderComments(item);
        renderAll();
      });
    });
    list.querySelectorAll('[data-delr]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const [cid, rid] = btn.dataset.delr.split('::');
        if(!confirm('ลบการตอบกลับนี้?')) return;
        const parent = item.comments.find(c=>c.id===cid);
        if(parent){ parent.replies = (parent.replies||[]).filter(r=>r.id!==rid); }
        await saveState();
        renderComments(item);
        renderAll();
      });
    });
    list.querySelectorAll('[data-replytoggle]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const cid = btn.dataset.replytoggle;
        openReplyFor = (openReplyFor === cid) ? null : cid;
        renderComments(item);
      });
    });
    if(openReplyFor){ renderReplyForm(item, openReplyFor); }
  }
  renderCommentFormArea(item);
}
function renderReplyForm(item, commentId){
  const area = document.getElementById('replyFormArea-' + commentId);
  if(!area) return;
  const persona = state.settings;
  if(!persona.personaName){
    area.innerHTML = `
      <div class="persona-setup" style="text-align:left; padding:10px; margin-top:4px;">
        <p style="margin:0 0 8px 0;">ตั้งนามแฝงก่อนตอบกลับ</p>
        <button class="btn small primary" id="replyNeedsPersonaBtn">ตั้งนามแฝง</button>
      </div>
    `;
    document.getElementById('replyNeedsPersonaBtn').addEventListener('click', openSettings);
    return;
  }
  area.innerHTML = `
    <div class="comment-form reply-form">
      <div class="comment-avatar reply-avatar">${avatarHtml(persona.personaAvatar)}</div>
      <textarea id="replyTextInput" placeholder="ตอบกลับในนาม ${escapeAttr(persona.personaName)}..."></textarea>
      <button class="btn primary small send-btn" id="sendReplyBtn">ส่ง</button>
    </div>
  `;
  const ta = document.getElementById('replyTextInput');
  ta.focus();
  document.getElementById('sendReplyBtn').addEventListener('click', async ()=>{
    const text = ta.value.trim();
    if(!text) return;
    const parent = item.comments.find(c=>c.id===commentId);
    if(!parent) return;
    if(!Array.isArray(parent.replies)) parent.replies = [];
    parent.replies.push({
      id: uid(),
      author: state.settings.personaName,
      avatar: state.settings.personaAvatar,
      text,
      date: new Date().toISOString()
    });
    await saveState();
    openReplyFor = null;
    renderComments(item);
    renderAll();
  });
}
function renderCommentFormArea(item){
  const area = document.getElementById('commentFormArea');
  const persona = state.settings;
  if(!persona.personaName){
    area.innerHTML = `
      <div class="persona-setup">
        <p>ตั้งนามแฝงก่อนเริ่มคอมเมนต์ในหิ้งนี้</p>
        <div class="persona-setup-row">
          <div class="avatar-upload" id="quickAvatarUpload" style="width:44px;height:44px;">
            <span id="quickAvatarPlaceholder">🙂</span>
          </div>
          <input type="file" id="quickAvatarInput" accept="image/*" style="display:none">
          <input type="text" id="quickPersonaName" placeholder="นามแฝงของคุณ">
          <button class="btn primary small" id="quickPersonaSaveBtn">สร้างนามแฝง</button>
        </div>
      </div>
    `;
    let quickAvatarDraft = null;
    const quickAvatarUpload = document.getElementById('quickAvatarUpload');
    const quickAvatarInput = document.getElementById('quickAvatarInput');
    quickAvatarUpload.addEventListener('click', ()=> quickAvatarInput.click());
    quickAvatarInput.addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      try{
        quickAvatarDraft = await resizeImageFile(file, 300);
        quickAvatarUpload.innerHTML = `<img src="${escapeAttr(quickAvatarDraft)}" alt="avatar">`;
      }catch(err){ console.error(err); }
      e.target.value = '';
    });
    document.getElementById('quickPersonaSaveBtn').addEventListener('click', async ()=>{
      const name = document.getElementById('quickPersonaName').value.trim();
      if(!name){ document.getElementById('quickPersonaName').focus(); return; }
      state.settings.personaName = name;
      if(quickAvatarDraft) state.settings.personaAvatar = quickAvatarDraft;
      await saveState();
      renderComments(item);
    });
  } else {
    area.innerHTML = `
      <div class="comment-form">
        <div class="comment-avatar">${avatarHtml(persona.personaAvatar)}</div>
        <textarea id="newCommentText" placeholder="เขียนคอมเมนต์ในนาม ${escapeAttr(persona.personaName)}..."></textarea>
        <button class="btn primary small send-btn" id="sendCommentBtn">ส่ง</button>
      </div>
      <div style="margin-top:8px; text-align:right;">
        <button class="change-persona-link" id="changePersonaBtn">เปลี่ยนนามแฝง/รูปโปรไฟล์</button>
      </div>
    `;
    document.getElementById('sendCommentBtn').addEventListener('click', async ()=>{
      const ta = document.getElementById('newCommentText');
      const text = ta.value.trim();
      if(!text) return;
      item.comments = item.comments || [];
      item.comments.push({
        id: uid(),
        author: state.settings.personaName,
        avatar: state.settings.personaAvatar,
        text,
        date: new Date().toISOString()
      });
      await saveState();
      ta.value = '';
      renderComments(item);
      renderAll();
    });
    document.getElementById('changePersonaBtn').addEventListener('click', openSettings);
  }
}

function renderDetailPage(item){
  if(!item) { showListScreen(); return; }
  const cat = state.categories.find(c=>c.id===item.categoryId);
  const tier = tierOf(item.score);
  const images = item.images || [];
  renderGalleryMain(images);
  const thumbsWrap = document.getElementById('galleryThumbs');
  if(images.length > 1){
    thumbsWrap.innerHTML = '';
    images.forEach((src, idx)=>{
      const t = document.createElement('div');
      t.className = 'g-thumb' + (idx===currentGalleryIdx ? ' active' : '');
      t.innerHTML = `<img src="${escapeAttr(src)}" alt="รูปที่ ${idx+1}">`;
      t.addEventListener('click', ()=>{ currentGalleryIdx = idx; renderDetailPage(item); });
      thumbsWrap.appendChild(t);
    });
  } else {
    thumbsWrap.innerHTML = '';
  }
  document.getElementById('pageRibbon').style.display = item.score >= 9 ? '' : 'none';
  document.getElementById('pageCatTag').textContent = cat ? `${cat.icon} ${cat.name}` : '';
  document.getElementById('pageTitle').textContent = item.title;
  const stampEl = document.getElementById('pageStamp');
  stampEl.style.color = tier.color;
  stampEl.querySelector('.num').textContent = item.score.toFixed(1);
  const tierBadge = document.getElementById('pageTierBadge');
  tierBadge.textContent = tier.label;
  tierBadge.style.color = tier.color;
  document.getElementById('pageMetaCat').textContent = cat ? cat.name : '—';
  document.getElementById('pageMetaDate').textContent = item.date || '—';
  document.getElementById('pageMetaImgCount').textContent = images.length ? `${images.length} รูป` : 'ไม่มีรูป';
  const noteEl = document.getElementById('pageNote');
  if(item.note){ noteEl.textContent = item.note; noteEl.classList.remove('empty'); }
  else { noteEl.textContent = 'ยังไม่มีบันทึกรีวิวสำหรับรายการนี้'; noteEl.classList.add('empty'); }

  if(!item.comments) item.comments = [];
  renderComments(item);
}
document.getElementById('backBtn').addEventListener('click', ()=>{ location.hash = ''; });
document.getElementById('pageEditBtn').addEventListener('click', ()=>{ openEditItem(currentDetailId, true); });
document.getElementById('pageDeleteBtn').addEventListener('click', async ()=>{
  const item = state.items.find(i=>i.id===currentDetailId);
  if(!item) return;
  if(!confirm(`ลบ "${item.title}" ออกจากหิ้ง?`)) return;
  state.items = state.items.filter(i=>i.id!==currentDetailId);
  await saveState();
  renderAll();
  location.hash = '';
});
window.addEventListener('hashchange', handleRoute);
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    catOverlay.classList.remove('show');
    itemOverlay.classList.remove('show');
    settingsOverlay.classList.remove('show');
  }
});

/* ---------- Settings modal ---------- */
const settingsOverlay = document.getElementById('settingsOverlay');
let settingsAvatarDraft = undefined; // undefined = no change made this session

function renderPersonaAvatarPreview(){
  const el = document.getElementById('personaAvatarUpload');
  const src = settingsAvatarDraft !== undefined ? settingsAvatarDraft : state.settings.personaAvatar;
  const badge = '<div class="edit-badge">✏️</div>';
  el.innerHTML = src ? `<img src="${escapeAttr(src)}" alt="avatar">${badge}` : `<span id="personaAvatarPlaceholder">🙂</span>${badge}`;
}
function updateThemeSwatchUI(){
  document.querySelectorAll('.theme-swatch').forEach(sw=>{
    sw.classList.toggle('active', sw.dataset.theme === state.settings.theme);
  });
}
function openSettings(){
  document.getElementById('personaNameInput').value = state.settings.personaName || '';
  settingsAvatarDraft = undefined;
  renderPersonaAvatarPreview();
  updateThemeSwatchUI();
  settingsOverlay.classList.add('show');
}
document.getElementById('openSettingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsCloseBtn').addEventListener('click', ()=> settingsOverlay.classList.remove('show'));
settingsOverlay.addEventListener('click', e=>{ if(e.target===settingsOverlay) settingsOverlay.classList.remove('show'); });

document.getElementById('personaAvatarUpload').addEventListener('click', ()=> document.getElementById('personaAvatarInput').click());
document.getElementById('personaAvatarInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    settingsAvatarDraft = await resizeImageFile(file, 300);
    renderPersonaAvatarPreview();
  }catch(err){ console.error(err); }
  e.target.value = '';
});
document.getElementById('personaSaveBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('personaNameInput').value.trim();
  if(!name){ document.getElementById('personaNameInput').focus(); return; }
  state.settings.personaName = name;
  if(settingsAvatarDraft !== undefined) state.settings.personaAvatar = settingsAvatarDraft;
  await saveState();
  settingsAvatarDraft = undefined;
  const item = state.items.find(i=>i.id===currentDetailId);
  if(item && document.getElementById('screenDetail').style.display !== 'none'){ renderComments(item); }
});
document.querySelectorAll('.theme-swatch').forEach(sw=>{
  sw.addEventListener('click', async ()=>{
    state.settings.theme = sw.dataset.theme;
    applyTheme(state.settings.theme);
    updateThemeSwatchUI();
    await saveState();
  });
});

/* ---------- init ---------- */
(async function init(){
  await loadState();
  applyTheme(state.settings.theme);
  activeCatId = state.categories[0] ? state.categories[0].id : null;
  renderAll();
  handleRoute();
})();
